name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # create GitHub Release
  packages: write        # push to GitHub Container Registry
  id-token: write        # needed for OIDC token (future signing)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Run tests before releasing ─────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: Test
        run: uv run pytest --tb=short -q

  # ── Build and push multi-arch Docker image ─────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: test
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Full semver tag:  v1.2.3  →  1.2.3
            type=semver,pattern={{version}}
            # Minor tag:        v1.2.3  →  1.2
            type=semver,pattern={{major}}.{{minor}}
            # Major tag:        v1.2.3  →  1
            type=semver,pattern={{major}}
            # latest on every release tag
            type=raw,value=latest

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to generate changelog

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [X.Y.Z]" to the next "## [" or end of file
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > changelog.md

          # Fall back to git log if CHANGELOG.md has no entry for this version
          if [ ! -s changelog.md ]; then
            echo "⚠️  No CHANGELOG.md entry for ${VERSION}, falling back to git log"
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..HEAD"
            else
              RANGE="HEAD"
            fi
            {
              echo "### Changes"
              echo ""
              git log ${RANGE} --pretty=format:"- %s (%h)" --no-merges
            } > changelog.md
          fi
          cat changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
